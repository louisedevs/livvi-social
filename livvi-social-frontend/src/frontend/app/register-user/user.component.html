<div class="register-page">

  <!-- Fundo com partículas decorativas -->
  <div class="bg-decoration">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="register-card">

    <!-- Topo -->
    <div class="card-top">
      <a routerLink="/register" class="back-btn" title="Voltar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </a>
      <img src="assets/Logodarkmode_fundopreto.jpg" alt="Livvi" class="card-logo" />
    </div>

    <!-- Header -->
    <div class="card-header">
      <h2 class="card-title">Crie sua conta</h2>
      <p class="card-sub">Rápido. Seu perfil faz o resto.</p>
    </div>

    <!-- Formulário -->
    <form (ngSubmit)="onSubmit()" #userForm="ngForm" class="register-form">

      <div class="field-group">
        <input
          class="field-input"
          [class.has-error]="name.invalid && (name.dirty || name.touched)"
          type="text" id="name" placeholder="Seu nome"
          required [(ngModel)]="user.name" name="name" #name="ngModel" />
        <span class="field-error" *ngIf="name.invalid && (name.dirty || name.touched)">
          Opa, seu nome é importante!
        </span>
      </div>

      <div class="field-group">
        <input
          class="field-input"
          [class.has-error]="email.invalid && (email.dirty || email.touched)"
          type="email" id="email" placeholder="Seu melhor email"
          required email [(ngModel)]="user.email" name="email" #email="ngModel" />
        <span class="field-error" *ngIf="email.invalid && (email.dirty || email.touched)">
          Precisamos de um email válido.
        </span>
      </div>

      <div class="field-group">
        <div class="input-wrapper">
          <input
            class="field-input"
            [class.has-error]="password.invalid && (password.dirty || password.touched)"
            [type]="showPassword ? 'text' : 'password'"
            id="password" placeholder="Crie uma senha"
            required minlength="6"
            [(ngModel)]="user.password" name="password" #password="ngModel" />
          <button class="toggle-pw" type="button" (click)="showPassword = !showPassword">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span class="field-error" *ngIf="password.invalid && (password.dirty || password.touched)">
          Mínimo 6 caracteres.
        </span>
      </div>

      <button type="submit" class="btn-criar" [disabled]="userForm.invalid">
        Entrar no Livvi
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="15" height="15">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>

    </form>

    <p class="login-cta">
      Já tem conta?
      <a routerLink="/home" class="link-accent">Entrar</a>
    </p>

  </div>

</div>
